# Dokploy / production-style compose: builds YOUR repo (Dockerfile), not Docker Hub.
# In Dokploy set "Compose Path" to: ./docker-compose.dokploy.yml
#
# The Dockerfile runs `yarn dist` in frontend/ and merges `frontend/dist/static/*` into
# `static/` so LMS and other React pages work without committing built bundles.
#
# Database persistence (critical):
#   The named volume `mediacms_pgdata` must survive redeploys. If Postgres data is lost on
#   restart, you get an empty DB every time: admin/users/media gone and default categories
#   come back from fixtures. In Dokploy, do not remove project volumes on deploy; avoid
#   `docker compose down -v`. Prefer a dedicated Postgres service or external volume if
#   your platform prunes anonymous volumes.
#
# Optional (migrations service / project env):
#   SEED_DEFAULT_CATEGORIES=no — skip fixtures/categories.json even on first install
#
# Required env in Dokploy (project or service):
#   FRONTEND_HOST=https://your.domain.tld
#   SECRET_KEY=<long-random-string>
#   POSTGRES_PASSWORD=<strong-password>
#
# Optional:
#   ADMIN_PASSWORD=...  (else prestart generates one and prints to logs on first install)
#   HTTP_PUBLISH_PORT=8080  (host port for web; default 8080 — Dokploy/nginx often already uses 80)
#
# Email (set on web AND celery_worker — mail is sent via Celery):
#   EMAIL_HOST, EMAIL_PORT (default 587), EMAIL_HOST_USER, EMAIL_HOST_PASSWORD
#   EMAIL_USE_TLS=True (default), EMAIL_USE_SSL=False — use SSL for port 465
#   DEFAULT_FROM_EMAIL, SERVER_EMAIL, ADMIN_EMAIL_LIST=comma@separated@emails
# Aliases: SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, MAIL_FROM

services:
  db:
    # Use a moving 17.x Alpine tag so pulls succeed on more registries/mirrors; force pull
    # so `compose up --build` does not fail with "No such image" when only app images build.
    image: postgres:17-alpine
    pull_policy: always
    restart: unless-stopped
    volumes:
      - mediacms_pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: mediacms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediacms}
      POSTGRES_DB: mediacms
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    pull_policy: always
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    command: ["./deploy/docker/prestart.sh"]
    environment:
      ENABLE_UWSGI: "no"
      ENABLE_NGINX: "no"
      ENABLE_CELERY_SHORT: "no"
      ENABLE_CELERY_LONG: "no"
      ENABLE_CELERY_BEAT: "no"
      ENABLE_MIGRATIONS: "yes"
      FRONTEND_HOST: ${FRONTEND_HOST:-http://localhost}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: db
      POSTGRES_NAME: mediacms
      POSTGRES_USER: mediacms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediacms}
      POSTGRES_PORT: "5432"
      REDIS_LOCATION: redis://redis:6379/1
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SEED_DEFAULT_CATEGORIES: ${SEED_DEFAULT_CATEGORIES:-yes}
    volumes:
      - mediacms_media:/home/mediacms.io/mediacms/media_files
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PUBLISH_PORT:-8080}:80"
    environment:
      ENABLE_CELERY_BEAT: "no"
      ENABLE_CELERY_SHORT: "no"
      ENABLE_CELERY_LONG: "no"
      ENABLE_MIGRATIONS: "no"
      FRONTEND_HOST: ${FRONTEND_HOST:-http://localhost}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: db
      POSTGRES_NAME: mediacms
      POSTGRES_USER: mediacms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediacms}
      POSTGRES_PORT: "5432"
      REDIS_LOCATION: redis://redis:6379/1
      DEBUG: "False"
      # SMTP / email — read by deploy/docker/local_settings.py.
      # EMAIL_* are the canonical names; SMTP_*/MAIL_FROM are accepted as aliases.
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
      SERVER_EMAIL: ${SERVER_EMAIL:-}
      ADMIN_EMAIL_LIST: ${ADMIN_EMAIL_LIST:-}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
    volumes:
      - mediacms_media:/home/mediacms.io/mediacms/media_files
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENABLE_UWSGI: "no"
      ENABLE_NGINX: "no"
      ENABLE_CELERY_SHORT: "no"
      ENABLE_CELERY_LONG: "no"
      ENABLE_MIGRATIONS: "no"
      FRONTEND_HOST: ${FRONTEND_HOST:-http://localhost}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: db
      POSTGRES_NAME: mediacms
      POSTGRES_USER: mediacms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediacms}
      POSTGRES_PORT: "5432"
      REDIS_LOCATION: redis://redis:6379/1
    volumes:
      - mediacms_media:/home/mediacms.io/mediacms/media_files
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENABLE_UWSGI: "no"
      ENABLE_NGINX: "no"
      ENABLE_CELERY_BEAT: "no"
      ENABLE_MIGRATIONS: "no"
      FRONTEND_HOST: ${FRONTEND_HOST:-http://localhost}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: db
      POSTGRES_NAME: mediacms
      POSTGRES_USER: mediacms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediacms}
      POSTGRES_PORT: "5432"
      REDIS_LOCATION: redis://redis:6379/1
      # SMTP / email — celery_worker is the process that actually opens the SMTP
      # connection (CeleryEmailBackend), so it MUST receive these vars.
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
      SERVER_EMAIL: ${SERVER_EMAIL:-}
      ADMIN_EMAIL_LIST: ${ADMIN_EMAIL_LIST:-}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
    volumes:
      - mediacms_media:/home/mediacms.io/mediacms/media_files
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  mediacms_pgdata:
  mediacms_media:

[program:celery_long]
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
startsecs=10
numprocs=1
user=www-data
directory=/home/mediacms.io/mediacms
priority=500
startinorder=true
autorestart=true
stopasgroup=true
killasgroup=true
# Foreground worker so logs reach Docker stdout (was `celery multi start long1 ... --logfile=...`
# which daemonized and wrote to a file inside the container).
command=/home/mediacms.io/bin/celery -A cms worker -n long@%%h --loglevel=INFO -Ofair --prefetch-multiplier=1 -Q long_tasks
